<!DOCTYPE html>
<html lang="pt-br"data-theme="violet">
</html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <main class="container">
  <h1>Cadastro</h1>
  <form action="feed.html">
    <label>Nome
      <input type="text" name="nome" placeholder="Digite aqui seu nome completo" required>
    </label>
    <label>E-mail
      <input type="email" name="email" placeholder="seu@email.com" required>
    </label>
    <label>Usuário
      <input type="text" name="usuario" placeholder="digite seu usu@rio" required>
    </label>
    <label>Senha
      <input type="password" name="senha" placeholder="Crie uma senha" required minlength="6">
    </label>
    <label>Confirmar Senha
      <input type="password" name="confirmar" placeholder="Confirme sua senha" required minlength="6">
    </label>
    <label>Gênero
      <select name="genero" required>
        <option value="">Selecione</option>
        <option value="feminino">Feminino</option>
        <option value="masculino">Masculino</option>
        <option value="outro">Prefiro não inf.</option>
      </select>
    </label>
    <label>Data de Nascimento
      <input type="date" name="nascimento" required>
    </label>
    <button type="submit">Cadastrar</button>
  </form>
  <p><a href="index.html">Já tenho uma conta? Entrar</a></p>
</main>  
</body>
</html>
